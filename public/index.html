<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ummon Glyph</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="display-page">

  <!-- Connection indicator -->
  <div class="conn-indicator">
    <span class="conn-dot" id="conn-dot"></span>
    <span class="conn-label">UMMON</span>
  </div>

  <!-- Main glyph area -->
  <main class="glyph-stage">
    <div class="glyph-frame">
      <canvas id="glyph-canvas"></canvas>
    </div>

    <div class="glyph-info">
      <p class="status-line" id="status-text">connecting…</p>
      <p class="meta-line"   id="meta-text">—</p>
    </div>
  </main>

  <!-- Nav to admin -->
  <a href="/admin.html" class="admin-link" title="Admin">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="10" cy="10" r="3"/>
      <path d="M10 1v2m0 14v2M1 10h2m14 0h2M3.5 3.5l1.4 1.4m10.2 10.2l1.4 1.4M3.5 16.5l1.4-1.4m10.2-10.2l1.4-1.4"/>
    </svg>
  </a>

  <script src="/js/glyph-engine.js"></script>
  <script src="/js/glyph-renderer.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
