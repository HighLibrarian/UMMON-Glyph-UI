<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ummon · Home Assistant</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="admin-page">
  <header class="topbar">
    <a href="/" class="topbar-brand">
      <span class="brand-glyph">◆</span> Ummon Glyph
    </a>
    <nav class="topbar-nav">
      <a href="/" class="topbar-link">Display</a>
      <a href="/admin.html" class="topbar-link">Admin</a>
      <a href="/ha-admin.html" class="topbar-link active">Home Assistant</a>
      <a href="#" class="topbar-link" id="logout-link" style="display:none;" onclick="fetch('/auth/logout',{method:'POST'}).then(function(){window.location.href='/login'});return false;">Logout</a>
    </nav>
    <div class="topbar-status">
      <span class="conn-dot small" id="conn-dot"></span>
      <span id="topbar-state">—</span>
    </div>
  </header>
  <main class="ha-layout">
    <!-- ╔═ Connection Card ════════════════════════════════════╗ -->
    <section class="card ha-conn-card">
      <h2 class="card-title">Home Assistant Connection</h2>
      <div class="ha-conn-section">
        <div class="form-row">
          <label>Host / IP</label>
          <input type="text" id="ha-host" placeholder="e.g. http://192.168.1.10:8123" />
        </div>
        <div class="form-row">
          <label>Long-Lived Access Token</label>
          <input type="password" id="ha-token" placeholder="Long-lived access token" />
        </div>
        <div class="form-row">
          <label>Entity Label <small>(label in HA to expose entities)</small></label>
          <input type="text" id="ha-label" placeholder="glyph" value="glyph" />
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btn-ha-save">Save</button>
          <button class="btn btn-secondary" id="btn-ha-test">Test Connection</button>
        </div>
        <div id="ha-conn-status" class="ha-conn-status-area"></div>
        <div class="ha-ws-status">
          WebSocket: <span id="ha-ws-indicator" class="conn-dot small"></span>
          <span id="ha-ws-label">—</span>
        </div>
      </div>
    </section>

    <!-- ╔═ Entity Panel ═══════════════════════════════════════╗ -->
    <section class="card ha-entities-card">
      <div class="ha-entities-header">
        <h2 class="card-title">Entities Exposed to Glyphs</h2>
        <div class="ha-entities-actions">
          <button class="btn btn-secondary btn-small" id="btn-ha-refresh">Refresh</button>
          <button class="btn btn-primary btn-small" id="btn-ha-add-entity">+ Add Entity</button>
        </div>
      </div>
      <div class="ha-entity-table-wrap">
        <table class="ha-entity-table" id="ha-entity-table">
          <thead>
            <tr>
              <th>Device Name</th>
              <th>Domain</th>
              <th>Intent</th>
              <th>Urgency</th>
              <th>TTL</th>
              <th>Triggers</th>
              <th>Enabled</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </section>

    <div class="toast" id="ha-toast"></div>
  </main>

  <!-- ╔═ Edit Entity Modal ════════════════════════════════════╗ -->
  <div class="ha-modal-overlay" id="ha-modal-overlay" style="display:none">
    <div class="ha-modal">
      <h3 id="ha-modal-title">Edit Entity</h3>
      <div class="ha-modal-body">
        <div class="form-row">
          <label>Entity ID</label>
          <input type="text" id="ha-edit-entity-id" readonly />
        </div>
        <div class="form-row">
          <label>Device Name</label>
          <input type="text" id="ha-edit-name" />
        </div>
        <div class="form-row-inline">
          <div class="form-row">
            <label>Domain</label>
            <select id="ha-edit-domain">
              <option value="">—</option>
              <option value="appliance">Appliance</option>
              <option value="system">System</option>
              <option value="security">Security</option>
              <option value="climate">Climate</option>
              <option value="media">Media</option>
              <option value="voice">Voice</option>
            </select>
          </div>
          <div class="form-row">
            <label>Intent</label>
            <select id="ha-edit-intent">
              <option value="">—</option>
              <option value="notification">Notification</option>
              <option value="idle">Idle</option>
              <option value="voice">Voice</option>
              <option value="automation">Automation</option>
              <option value="alert">Alert</option>
              <option value="status">Status</option>
            </select>
          </div>
        </div>
        <div class="form-row-inline">
          <div class="form-row">
            <label>Device (glyph device name)</label>
            <input type="text" id="ha-edit-device" placeholder="e.g. thermostat" />
          </div>
          <div class="form-row">
            <label>Urgency</label>
            <select id="ha-edit-urgency">
              <option value="0">0 — None</option>
              <option value="1">1 — Low</option>
              <option value="2">2 — Medium</option>
              <option value="3">3 — High</option>
              <option value="4">4 — Critical (blink)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>TTL (seconds)</label>
          <input type="number" id="ha-edit-ttl" value="30" min="1" max="3600" />
        </div>
        <div class="form-row">
          <label>Enabled</label>
          <label class="ha-toggle-label">
            <input type="checkbox" id="ha-edit-enabled" checked />
            <span>Active — triggers will create glyphs</span>
          </label>
        </div>

        <!-- Triggers -->
        <div class="ha-triggers-section">
          <h4>Triggers <small>(when state matches → create glyph)</small></h4>
          <div id="ha-edit-triggers"></div>
          <button class="btn btn-ghost btn-small" id="ha-add-trigger">+ Add Trigger</button>
        </div>
      </div>
      <div class="ha-modal-actions">
        <button class="btn btn-secondary" id="ha-modal-cancel">Cancel</button>
        <button class="btn btn-secondary ha-btn-danger" id="ha-modal-delete">Delete</button>
        <button class="btn btn-primary" id="ha-modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ╔═ Add Entity Modal ═════════════════════════════════════╗ -->
  <div class="ha-modal-overlay" id="ha-add-modal-overlay" style="display:none">
    <div class="ha-modal">
      <h3>Add Entity</h3>
      <div class="ha-modal-body">
        <div class="form-row">
          <label>Search Entities</label>
          <input type="text" id="ha-add-search" placeholder="Type to filter…" />
        </div>
        <div class="ha-add-entity-list" id="ha-add-entity-list">
          <div class="log-empty">Loading entities…</div>
        </div>
      </div>
      <div class="ha-modal-actions">
        <button class="btn btn-secondary" id="ha-add-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/ha-panel.js"></script>
  <script src="/js/ha-panel-connection.js"></script>
</body>
</html>
